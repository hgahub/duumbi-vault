<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 46px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .section { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .label { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .small { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .tiny { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .micro { font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .rule { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .box { fill: #ffffff; stroke-width: 2.4; rx: 12; }
      .line { stroke: #64748b; stroke-width: 3; fill: none; }
      .thin { stroke: #94a3b8; stroke-width: 2; fill: none; }
      .dash { stroke-dasharray: 8 7; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#059669"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1672" height="941"/>
  <text class="title" x="56" y="64">DUUMBI Agentic Development Runbook</text>
  <text class="subtitle" x="58" y="98">Slack, Codex, Obsidian, and GitHub converge into one GitHub-backed delivery workflow with AI spec gates and human merge authorization.</text>

  <rect x="56" y="122" width="1560" height="208" rx="22" fill="#eef6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text class="section" x="82" y="156">1. Capture and raw intake</text>

  <rect class="box" x="82" y="184" width="255" height="94" stroke="#2563eb"/>
  <rect x="102" y="201" width="72" height="22" rx="11" fill="#2563eb"/><text class="micro" x="119" y="216">Stage 1</text>
  <text class="label" x="102" y="244">Slack ideas</text>
  <text class="small" x="102" y="266">#duumbi-ideas or shortcut</text>

  <rect class="box" x="367" y="184" width="255" height="94" stroke="#2563eb"/>
  <rect x="387" y="201" width="72" height="22" rx="11" fill="#2563eb"/><text class="micro" x="404" y="216">Stage 2</text>
  <text class="label" x="387" y="244">Codex intake</text>
  <text class="small" x="387" y="266">App, Cloud, or CLI</text>

  <rect class="box" x="652" y="184" width="255" height="94" stroke="#0f766e" fill="#ecfdf5"/>
  <rect x="672" y="201" width="72" height="22" rx="11" fill="#0f766e"/><text class="micro" x="689" y="216">Manual</text>
  <text class="label" x="672" y="244">Obsidian Inbox</text>
  <text class="small" x="672" y="266">Raw Markdown notes</text>

  <rect class="box" x="937" y="184" width="255" height="94" stroke="#7c3aed"/>
  <rect x="957" y="201" width="72" height="22" rx="11" fill="#7c3aed"/><text class="micro" x="974" y="216">GitHub</text>
  <text class="label" x="957" y="244">Issues and ideas</text>
  <text class="small" x="957" y="266">Bugs, discussions, duplicates</text>

  <rect class="box" x="1244" y="171" width="310" height="120" stroke="#f59e0b" fill="#fffbeb"/>
  <rect x="1264" y="190" width="110" height="22" rx="11" fill="#f59e0b"/><text class="micro" x="1280" y="205">Enrichment</text>
  <text class="label" x="1264" y="236">Normalize and dedupe</text>
  <text class="small" x="1264" y="260">Active Inbox, Processed Inbox, Atlas, GitHub</text>
  <text class="tiny" x="1264" y="281">No GitHub issue from enrichment</text>

  <path class="line" d="M337 231 L367 231" marker-end="url(#arrow)"/>
  <path class="line" d="M622 231 L652 231" marker-end="url(#arrow)"/>
  <path class="line" d="M907 231 L937 231" marker-end="url(#arrow)"/>
  <path class="line" d="M1192 231 L1244 231" marker-end="url(#arrow)"/>

  <rect x="56" y="356" width="1560" height="172" rx="22" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text class="section" x="82" y="390">2. Triage and acceptance</text>

  <rect class="box" x="82" y="418" width="290" height="78" stroke="#f59e0b" fill="#fff7ed"/>
  <text class="label" x="102" y="449">Triage queue refill</text>
  <text class="small" x="102" y="472">Every 3 hours: keep Todo at 3</text>
  <text class="tiny" x="102" y="490">Fail closed if Project V2 is unreadable</text>

  <rect class="box" x="430" y="418" width="285" height="78" stroke="#f59e0b" fill="#fff7ed"/>
  <text class="label" x="450" y="449">Stage 4 triage</text>
  <text class="small" x="450" y="472">Create/update canonical GitHub issue</text>
  <text class="tiny" x="450" y="490">Route to Needs Human Acceptance</text>

  <rect class="box" x="772" y="418" width="285" height="78" stroke="#dc2626" fill="#fef2f2"/>
  <text class="label" x="792" y="449">Stage 5 acceptance</text>
  <text class="small" x="792" y="472">Human accepts, defers, rejects, clarifies</text>
  <text class="tiny" x="792" y="490">Slack or GitHub decision comment</text>

  <rect class="box" x="1114" y="418" width="374" height="78" stroke="#0f766e" fill="#ecfdf5"/>
  <text class="label" x="1134" y="449">Spec Needed</text>
  <text class="small" x="1134" y="472">Execution item is accepted and ready for delivery</text>
  <text class="tiny" x="1134" y="490">Codex App can start Delivery Autopilot</text>

  <path class="line" d="M372 457 L430 457" marker-end="url(#arrow)"/>
  <path class="line" d="M715 457 L772 457" marker-end="url(#arrow)"/>
  <path class="line" d="M1057 457 L1114 457" marker-end="url(#arrowGreen)"/>

  <rect x="56" y="554" width="1560" height="206" rx="22" fill="#f8fbff" stroke="#cbd5e1" stroke-width="2"/>
  <text class="section" x="82" y="588">3. Delivery Autopilot: spec gates and implementation</text>

  <rect class="box" x="82" y="620" width="220" height="86" stroke="#2563eb"/>
  <text class="label" x="102" y="652">Stage 6</text>
  <text class="small" x="102" y="676">Product spec PR</text>
  <text class="tiny" x="102" y="695">Spec-only; no auto-close</text>

  <polygon points="392,615 440,663 392,711 344,663" fill="#faf5ff" stroke="#7c3aed" stroke-width="2.5"/>
  <text class="label" x="468" y="634">Stage 7 AI gate</text>
  <text class="small" x="468" y="658">Copilot + Codex clean, checks OK</text>

  <rect class="box" x="690" y="620" width="220" height="86" stroke="#2563eb"/>
  <text class="label" x="710" y="652">Stage 8</text>
  <text class="small" x="710" y="676">Technical spec PR</text>
  <text class="tiny" x="710" y="695">BDD-to-test and Ralph policy</text>

  <polygon points="1000,615 1048,663 1000,711 952,663" fill="#faf5ff" stroke="#7c3aed" stroke-width="2.5"/>
  <text class="label" x="1076" y="634">Stage 9 AI gate</text>
  <text class="small" x="1076" y="658">Implementability review is clean</text>

  <rect class="box" x="1288" y="620" width="260" height="86" stroke="#059669" fill="#ecfdf5"/>
  <text class="label" x="1308" y="652">Stage 10 Ralph cycles</text>
  <text class="small" x="1308" y="676">Bounded implementation</text>
  <text class="tiny" x="1308" y="695">Stop at resource gate or blocker</text>

  <path class="line" d="M302 663 L344 663" marker-end="url(#arrow)"/>
  <path class="line" d="M440 614 L690 614" marker-end="url(#arrow)"/>
  <path class="line" d="M910 663 L952 663" marker-end="url(#arrow)"/>
  <path class="line" d="M1048 614 L1288 614" marker-end="url(#arrowGreen)"/>

  <rect x="104" y="724" width="1392" height="24" rx="12" fill="#111827"/>
  <text class="rule" x="136" y="742">AI gates can merge spec-only PRs when clean. Implementation merge still requires explicit human approval.</text>

  <rect x="56" y="786" width="1560" height="102" rx="22" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text class="section" x="82" y="820">4. Review, merge decision, closure</text>

  <rect class="box" x="318" y="838" width="234" height="36" stroke="#7c3aed"/>
  <text class="small" x="338" y="861">Stage 11 review artifact</text>
  <polygon points="672,831 704,856 672,881 640,856" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
  <text class="small" x="730" y="861">Human merge decision</text>
  <rect class="box" x="1012" y="838" width="220" height="36" stroke="#111827"/>
  <text class="small" x="1032" y="861">Stage 12 closure</text>
  <rect class="box" x="1326" y="838" width="230" height="36" stroke="#0f766e" fill="#ecfdf5"/>
  <text class="small" x="1346" y="861">Knowledge sync if durable</text>

  <path class="line" d="M552 856 L640 856" marker-end="url(#arrow)"/>
  <path class="line" d="M900 856 L1012 856" marker-end="url(#arrow)"/>
  <path class="line dash" d="M1232 856 L1326 856" marker-end="url(#arrow)"/>

  <rect x="56" y="906" width="1560" height="30" rx="15" fill="#0f172a"/>
  <text class="rule" x="92" y="927">GitHub = execution state</text>
  <text class="rule" x="430" y="927">Obsidian = durable knowledge</text>
  <text class="rule" x="820" y="927">Slack = capture, notification, approval</text>
  <text class="rule" x="1230" y="927">No raw Slack or prompts in workflow artifacts</text>
</svg>

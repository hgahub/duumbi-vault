<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040" role="img" aria-labelledby="title desc">
  <title id="title">2. állapot - Triage és emberi elfogadás</title>
  <desc id="desc">Infografika arról, hogyan jut egy jelölt triage és emberi elfogadás állapotba, milyen label vagy workflow fut, és milyen állapotokba mehet tovább.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #dbe3ee; stroke-width: 2; }
      .in { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; }
      .agent { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.5; }
      .action { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2.5; }
      .state { fill: #ecfdf5; stroke: #059669; stroke-width: 2.5; }
      .stop { fill: #fef2f2; stroke: #dc2626; stroke-width: 2.5; }
      .title { font: 760 46px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 450 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .section { font: 760 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .h { font: 760 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 520 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 650 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .badge { font: 820 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; letter-spacing: 0; }
      .arrow { stroke: #64748b; stroke-width: 3.4; fill: none; }
      .dash { stroke-dasharray: 9 8; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1800" height="1040"/>
  <text class="title" x="72" y="82">2. Triage és emberi elfogadás</text>
  <text class="subtitle" x="74" y="118">A jegyjelölt itt válik eldönthető munkává: pontosítás, duplikáció, scope, majd emberi döntés.</text>

  <rect class="panel" x="64" y="154" width="1672" height="122" rx="24"/>
  <text class="section" x="96" y="196">Fejlesztői értelmezés</text>
  <text class="body" x="96" y="230">Ebben a szakaszban még nincs specifikációs vagy implementációs engedély. A cél: a következő emberi döntéshez elég tiszta kontextus.</text>
  <text class="body" x="96" y="258">Az AI javasolhat és szintetizálhat, de a Stage 5 elfogadást ember végzi.</text>

  <text class="section" x="96" y="342">Belépés Stage 2-be</text>
  <g transform="translate(96 382)">
    <rect class="in" width="405" height="128" rx="18"/>
    <rect x="24" y="22" width="92" height="24" rx="12" fill="#2563eb"/><text class="badge" x="45" y="40">INPUT</text>
    <text class="h" x="24" y="72">Inbox jelölt vagy GitHub Issue</text>
    <text class="body" x="24" y="98">Stage 1 után normalizált input, bug report,</text>
    <text class="body" x="24" y="116">ötlet vagy kézzel létrehozott issue.</text>
  </g>
  <g transform="translate(96 542)">
    <rect class="in" width="405" height="128" rx="18"/>
    <rect x="24" y="22" width="92" height="24" rx="12" fill="#2563eb"/><text class="badge" x="45" y="40">EVENT</text>
    <text class="h" x="24" y="72">Queue refill szükséges</text>
    <text class="body" x="24" y="98">A Needs Human Acceptance sor a célérték</text>
    <text class="body" x="24" y="116">alá esik.</text>
  </g>
  <g transform="translate(96 702)">
    <rect class="in" width="405" height="128" rx="18"/>
    <rect x="24" y="22" width="92" height="24" rx="12" fill="#2563eb"/><text class="badge" x="45" y="40">EVENT</text>
    <text class="h" x="24" y="72">@Clarification komment</text>
    <text class="body" x="24" y="98">Ember pontosít egy needs-human-review</text>
    <text class="body" x="24" y="116">állapotú issue-n.</text>
  </g>

  <path class="arrow" d="M512 442 L626 442" marker-end="url(#arrow)"/>
  <path class="arrow" d="M512 602 L626 602" marker-end="url(#arrow)"/>
  <path class="arrow" d="M512 762 L626 762" marker-end="url(#arrow)"/>

  <text class="section" x="650" y="342">Skill vagy Action</text>
  <g transform="translate(650 382)">
    <rect class="agent" width="450" height="128" rx="18"/>
    <rect x="24" y="22" width="92" height="24" rx="12" fill="#7c3aed"/><text class="badge" x="45" y="40">SKILL</text>
    <text class="h" x="24" y="72">duumbi-triage</text>
    <text class="body" x="24" y="98">Deduplikál, GitHub/vault kontextust néz,</text>
    <text class="body" x="24" y="116">és route-olható issue-t készít.</text>
  </g>
  <g transform="translate(650 542)">
    <rect class="agent" width="450" height="128" rx="18"/>
    <rect x="24" y="22" width="112" height="24" rx="12" fill="#7c3aed"/><text class="badge" x="42" y="40">ACTION</text>
    <text class="h" x="24" y="72">triage-queue-refill.yml</text>
    <text class="body" x="24" y="98">4 óránként backstop; DeepSeek csak akkor,</text>
    <text class="body" x="24" y="116">ha a sor célérték alatt van.</text>
  </g>
  <g transform="translate(650 702)">
    <rect class="agent" width="450" height="128" rx="18"/>
    <rect x="24" y="22" width="112" height="24" rx="12" fill="#7c3aed"/><text class="badge" x="42" y="40">ACTION</text>
    <text class="h" x="24" y="72">clarification-routing.yml</text>
    <text class="body" x="24" y="98">Csak explicit @Clarification kommentre fut,</text>
    <text class="body" x="24" y="116">és szintézist ír vissza.</text>
  </g>

  <path class="arrow" d="M1112 442 L1216 442" marker-end="url(#arrow)"/>
  <path class="arrow" d="M1112 602 L1216 602" marker-end="url(#arrow)"/>
  <path class="arrow" d="M1112 762 L1216 762" marker-end="url(#arrow)"/>

  <text class="section" x="1240" y="342">Állapot és továbbvivő esemény</text>
  <g transform="translate(1240 382)">
    <rect class="state" width="440" height="128" rx="18"/>
    <rect x="24" y="22" width="92" height="24" rx="12" fill="#059669"/><text class="badge" x="43" y="40">STATE</text>
    <text class="h" x="24" y="72">Needs Human Acceptance</text>
    <text class="body" x="24" y="98">Label/status: needs-human-review.</text>
    <text class="body" x="24" y="116">Tovább: human-acceptance-request.yml.</text>
  </g>
  <g transform="translate(1240 542)">
    <rect class="action" width="440" height="128" rx="18"/>
    <rect x="24" y="22" width="112" height="24" rx="12" fill="#f59e0b"/><text class="badge" x="42" y="40">ACTION</text>
    <text class="h" x="24" y="72">human-acceptance-request.yml</text>
    <text class="body" x="24" y="98">issues:labeled vagy napi 2 backstop.</text>
    <text class="body" x="24" y="116">Slack értesítés és marker komment.</text>
  </g>
  <g transform="translate(1240 702)">
    <rect class="state" width="440" height="146" rx="18"/>
    <rect x="24" y="22" width="92" height="24" rx="12" fill="#059669"/><text class="badge" x="43" y="40">NEXT</text>
    <text class="h" x="24" y="72">Stage 5 döntés után</text>
    <text class="body" x="24" y="96">Accept -> Spec Needed;</text>
    <text class="body" x="24" y="116">kérdés -> Needs Clarification;</text>
    <text class="body" x="24" y="136">reject/defer/duplicate -> lezárás vagy halasztás.</text>
  </g>

  <rect class="panel" x="96" y="884" width="500" height="116" rx="18"/>
  <text class="h" x="124" y="922">Fejlesztő feladata</text>
  <text class="body" x="124" y="952">Ellenőrizd, hogy a scope elég pontos-e, van-e duplicate,</text>
  <text class="body" x="124" y="976">és ne induljon spec vagy kódmunka elfogadás előtt.</text>

  <rect class="panel" x="650" y="884" width="480" height="116" rx="18"/>
  <text class="h" x="678" y="922">Emberi döntési pont</text>
  <text class="body" x="678" y="952">A Slack/GitHub döntés nem AI gate: Accept, Clarify,</text>
  <text class="body" x="678" y="976">Duplicate, Defer vagy Reject emberi döntés.</text>

  <rect class="panel" x="1184" y="884" width="496" height="116" rx="18"/>
  <text class="h" x="1212" y="922">Kimenet</text>
  <text class="body" x="1212" y="952">Csak Accepted issue mehet Stage 6 product spec irányba.</text>
  <text class="body" x="1212" y="976">Minden más út bizonyítékkal dokumentált állapot.</text>
</svg>
